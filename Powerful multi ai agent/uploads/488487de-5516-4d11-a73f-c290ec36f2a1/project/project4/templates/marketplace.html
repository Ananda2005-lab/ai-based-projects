{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Marketplace</h2>
        
        <!-- Filter Form -->
        <form method="GET" action="{{ url_for('main.marketplace') }}" class="d-flex">
            <select name="category" class="form-select form-select-sm me-2" style="width: 150px;" onchange="this.form.submit()">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat }}" {% if selected_cat == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </form>
    </div>

    <!-- Products Grid -->
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        {% for product in products %}
        <div class="col">
            <div class="card product-card h-100">
                <img src="{{ product.image_url if product.image_url else 'https://via.placeholder.com/300x200?text=Fresh+Produce' }}" class="card-img-top" alt="{{ product.name }}">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">{{ product.name }}</h5>
                        <span class="category-badge">{{ product.category }}</span>
                    </div>
                    <p class="card-text text-muted small flex-grow-1">{{ product.description[:60] }}...</p>
                    
                    <div class="mt-auto">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="price-tag">₹{{ product.price }}<small class="text-muted fs-6">/kg</small></span>
                            <small class="text-muted"><i class="fas fa-user"></i> {{ product.farmer.username }}</small>
                        </div>
                        <a href="{{ url_for('main.product_detail', id=product.id) }}" class="btn btn-outline-success w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
            <h4 class="text-muted">No products found.</h4>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
